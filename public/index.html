<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasma Atelier | Premium Haute Couture</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { background-color: #030303; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
    .glass-header { background: rgba(3, 3, 3, 0.2); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
    .magnetic-wrap { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .glitch-reveal { clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">

  <!-- Interactive WebGL Fluid Simulation / Particle Background Panel -->
  <canvas id="luxury-gl-bg" class="fixed inset-0 w-full h-full pointer-events-none z-0 opacity-40"></canvas>

  <!-- Premium Floating Magnetic Cursor Core -->
  <div id="fluid-cursor" class="fixed top-0 left-0 w-3 h-3 bg-white rounded-full pointer-events-none mix-blend-difference z-[9999] scale-100 transition-transform duration-300 ease-out hidden md:block"></div>
  <div id="fluid-cursor-aura" class="fixed top-0 left-0 w-8 h-8 border border-white/20 rounded-full pointer-events-none mix-blend-difference z-[9998] scale-100 transition-transform duration-500 ease-out hidden md:block"></div>

  <!-- Apple-Level Sticky Adaptive Navigation Header -->
  <header class="glass-header fixed top-0 left-0 w-full z-50 border-b border-white/[0.04] px-12 py-6 flex items-center justify-between transition-all duration-500">
    <div class="flex items-center gap-16">
<a href="index.html" class="text-lg font-bold tracking-[0.5em] text-white uppercase active-scale">Plasma Atelier</a>
      <div class="hidden lg:flex items-center gap-10 text-[10px] font-medium tracking-[0.3em] text-zinc-400 uppercase">
        <a href="shop.html" class="hover:text-white transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[1px] after:w-0 after:bg-white after:transition-all hover:after:w-full">The Vault</a>
        <a href="#" class="hover:text-white transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[1px] after:w-0 after:bg-white after:transition-all hover:after:w-full">Collections</a>
        <a href="#" class="hover:text-white transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[1px] after:w-0 after:bg-white after:transition-all hover:after:w-full">Lineage</a>
      </div>
    </div>
    <div class="flex items-center gap-8 text-[11px] tracking-widest font-light">
      <a href="cart.html" class="magnetic-wrap relative flex items-center gap-2 hover:text-zinc-300 transition-colors">
        <span>BAG</span>
        <span id="nav-bag-count" class="bg-white text-black px-1.5 py-0.5 text-[9px] font-bold rounded-sm">0</span>
      </a>
    </div>
  </header>

  <!-- Interactive Parallax Hero Engine -->
  <section class="relative w-full h-screen flex items-center justify-center overflow-hidden z-10">
    <div id="hero-parallax-bg" class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1509631179647-0177331693ae?q=80&w=2070')] bg-cover bg-center filter grayscale contrast-115 transform scale-110 transition-transform duration-700"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-[#030303]"></div>

    <div class="relative z-20 text-center px-6 max-w-5xl">
      <p class="text-[9px] uppercase tracking-[0.6em] text-zinc-400 font-bold mb-6 opacity-0 animate-slide-up">Architectural Garments 2026</p>
      <h1 class="text-6xl md:text-9xl font-extralight tracking-[0.2em] text-white uppercase leading-none mb-12 glitch-reveal">
        RAW<br><span class="font-medium text-transparent bg-clip-text bg-gradient-to-r from-white via-zinc-400 to-white">EMOTION</span>
      </h1>
      <div class="opacity-0 animate-slide-up-delayed">
        <a href="shop.html" class="inline-flex items-center justify-center px-12 py-4 border border-white text-[10px] font-medium tracking-[0.4em] uppercase text-black bg-white transition-all duration-500 hover:bg-transparent hover:text-white hover:scale-105">
          Explore Architecture
        </a>
      </div>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
