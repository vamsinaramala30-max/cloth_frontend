<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault | Plasma Atelier</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { background-color: #030303; color: #ffffff; }
    .glass-header { background: rgba(3, 3, 3, 0.4); backdrop-filter: blur(20px); }
    .shimmer-bg { background: linear-gradient(90deg, #0a0a0a 25%, #161616 50%, #0a0a0a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="antialiased pt-28">

  <header class="glass-header fixed top-0 left-0 w-full z-50 border-b border-white/[0.04] px-12 py-6 flex items-center justify-between">
    <a href="index.html" class="text-lg font-bold tracking-[0.5em] text-white uppercase">Plasma Atelier</a>
    <a href="cart.html" class="text-[11px] tracking-widest text-white">BAG (<span id="shop-bag-count">0</span>)</a>
  </header>

  <main class="w-full px-12 py-8">
    <!-- Dynamic Real-Time Filtration Matrix Panel -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between border-b border-zinc-800 pb-8 mb-12 gap-6">
      <div>
        <h1 class="text-4xl font-extralight tracking-widest uppercase mb-2">The Vault</h1>
        <p id="total-metric" class="text-[10px] font-mono text-zinc-500 tracking-widest">CALCULATING CAPACITIES...</p>
      </div>
      <div class="flex items-center gap-4 w-full md:w-auto">
        <select id="filter-category" class="bg-zinc-950 border border-zinc-800 text-xs text-zinc-400 px-4 py-3 tracking-widest uppercase rounded-none focus:border-white focus:outline-none transition-colors">
          <option value="">All Categories</option>
          <option value="Men">Men</option>
          <option value="Women">Women</option>
        </select>
        <select id="sort-engine" class="bg-zinc-950 border border-zinc-800 text-xs text-zinc-400 px-4 py-3 tracking-widest uppercase rounded-none focus:border-white focus:outline-none transition-colors">
          <option value="latest">Latest Arrivals</option>
          <option value="price-low-high">Price: Low to High</option>
          <option value="price-high-low">Price: High to Low</option>
        </select>
      </div>
    </div>

    <!-- Active Injected Interactive Grid Node -->
    <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-8 gap-y-16">
      <!-- Generated Systematically -->
    </div>
  </main>

  <script src="js/shop.js"></script>
</body>
</html>
